name: crin

services:
  postgres:
    image: postgres:15-alpine
    container_name: crin_postgres
    environment:
      POSTGRES_USER: crplatform
      POSTGRES_PASSWORD: crplatform
      POSTGRES_DB: crplatform
    ports:
      - "5433:5432"
    volumes:
      - crin_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crplatform"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crin_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: crin_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - crin_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: crin_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/cr-artifacts;
      exit 0;
      "

  app:
    build: .
    container_name: crin_app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    # Host 8008: избегаем конфликта с чужими сервисами на :8000 (ISOLATION_POLICY).
    ports:
      - "8008:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      CRIN_DATABASE_URL: postgresql+asyncpg://crplatform:crplatform@postgres:5432/crplatform
      CRIN_DATABASE_URL_SYNC: postgresql://crplatform:crplatform@postgres:5432/crplatform
      CRIN_CELERY_BROKER_URL: redis://redis:6379/0
      CRIN_CELERY_RESULT_BACKEND: redis://redis:6379/1
      CRIN_REDIS_URL: redis://redis:6379/0
      CRIN_S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build: .
    container_name: crin_worker
    command: celery -A app.workers.celery_app worker -l info -Q discovery,probe,fetch,normalize,extract,score,reindex,compile_kb,lint_kb,refresh_backlinks,detect_conflicts,generate_outputs,file_outputs,rebuild_indexes
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      CRIN_DATABASE_URL: postgresql+asyncpg://crplatform:crplatform@postgres:5432/crplatform
      CRIN_DATABASE_URL_SYNC: postgresql://crplatform:crplatform@postgres:5432/crplatform
      CRIN_CELERY_BROKER_URL: redis://redis:6379/0
      CRIN_CELERY_RESULT_BACKEND: redis://redis:6379/1
      CRIN_REDIS_URL: redis://redis:6379/0
      CRIN_S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  streamlit:
    build: .
    container_name: crin_streamlit
    command: streamlit run app/ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      CRIN_DATABASE_URL: postgresql+asyncpg://crplatform:crplatform@postgres:5432/crplatform
      CRIN_DATABASE_URL_SYNC: postgresql://crplatform:crplatform@postgres:5432/crplatform
      CRIN_REDIS_URL: redis://redis:6379/0
      CRIN_S3_ENDPOINT_URL: http://minio:9000
      CRIN_STREAMLIT_API_BASE: http://app:8000
    depends_on:
      - app

volumes:
  crin_pg_data:
  crin_minio_data:
